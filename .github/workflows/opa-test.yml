name: OPA Policy Validation

on:
  push:
    branches: [main]
    paths:
      - '**/*.rego'
      - '.github/workflows/opa-test.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.rego'

# Least-privilege permissions — this workflow only needs read access
permissions:
  contents: read

jobs:
  validate:
    name: Check and Test Rego Policies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install OPA
        run: |
          curl -fsSL -o opa \
            https://github.com/open-policy-agent/opa/releases/download/v0.68.0/opa_linux_amd64_static
          curl -fsSL -o opa.sha256 \
            https://github.com/open-policy-agent/opa/releases/download/v0.68.0/opa_linux_amd64_static.sha256
          # Verify checksum — filename in the .sha256 file is 'opa_linux_amd64_static', rename accordingly
          cp opa opa_linux_amd64_static
          sha256sum --check opa.sha256
          rm opa_linux_amd64_static opa.sha256
          chmod +x opa
          sudo mv opa /usr/local/bin/
          opa version

      - name: Formatting check
        run: |
          echo "Checking Rego formatting ..."
          exit_code=0
          for f in $(find . -name "*.rego" -not -path "./.git/*" | sort); do
            result=$(opa fmt --fail "$f" 2>&1)
            rc=$?
            if [ $rc -ne 0 ]; then
              if echo "$result" | grep -q "result is invalid"; then
                echo "  SKIP (opa fmt bug — reserved keyword in field name): $f"
              else
                echo "  FAIL (needs formatting): $f  →  run: opa fmt -w $f"
                exit_code=1
              fi
            else
              echo "  OK: $f"
            fi
          done
          exit $exit_code

      - name: Syntax check — benchmarks
        run: |
          echo "Checking benchmarks/ ..."
          find benchmarks -name "*.rego" | sort | while read f; do
            opa check "$f" || exit 1
          done
          echo "benchmarks/ OK"

      - name: Syntax check — frameworks
        run: |
          echo "Checking frameworks/ ..."
          find frameworks -name "*.rego" | sort | while read f; do
            opa check "$f" || exit 1
          done
          echo "frameworks/ OK"

      - name: Syntax check — enforcement
        run: |
          echo "Checking enforcement/ ..."
          find enforcement -name "*.rego" | sort | while read f; do
            opa check "$f" || exit 1
          done
          echo "enforcement/ OK"

      - name: Syntax check — governance
        run: |
          echo "Checking governance/ ..."
          find governance -name "*.rego" | sort | while read f; do
            opa check "$f" || exit 1
          done
          echo "governance/ OK"

      - name: Syntax check — threat_detection
        run: |
          echo "Checking threat_detection/ ..."
          find threat_detection -name "*.rego" | sort | while read f; do
            opa check "$f" || exit 1
          done
          echo "threat_detection/ OK"

      - name: Run policy tests
        run: |
          echo "Running tests ..."
          exit_code=0
          for f in $(find . -name "*_test.rego" -not -path "./.git/*"); do
            dir=$(dirname "$f")
            echo "  Testing $dir ..."
            opa test "$dir" -v || exit_code=1
          done
          echo "Tests complete"
          exit $exit_code

      - name: Count policies
        run: |
          total=$(find . -name "*.rego" -not -path "./.git/*" | wc -l)
          echo "Total .rego files: $total"
          echo "Breakdown by domain:"
          for domain in benchmarks frameworks enforcement governance threat_detection; do
            count=$(find $domain -name "*.rego" 2>/dev/null | wc -l)
            echo "  $domain: $count"
          done

